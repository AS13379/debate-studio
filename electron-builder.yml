appId: com.leander.debatestudio
productName: Debate Studio
copyright: Copyright © 2026 Leander
artifactName: Debate-Studio-${version}-${arch}.${ext}
asar: true
npmRebuild: false
directories:
  output: release
  buildResources: build
extraResources:
  - from: build/icon.png
    to: icon.png
files:
  - out/**/*
  - package.json
publish:
  - provider: github
    owner: AS13379
    repo: debate-studio
    releaseType: release
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
dmg:
  sign: false
  title: Debate Studio ${version}
