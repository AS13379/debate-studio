name: macOS arm64 release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag to receive the DMG
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          package-manager-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        run: |
          npm run typecheck
          npm test

      - name: Build unsigned arm64 DMG
        run: npm run release:mac:arm64 -- --publish never

      - name: Verify packaged artifact
        run: npm run release:check

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: Debate-Studio-macOS-arm64
          path: |
            release/Debate-Studio-*-arm64.dmg
            release/Debate-Studio-*-arm64.dmg.blockmap
            release/Debate-Studio-*-arm64.zip
            release/Debate-Studio-*-arm64.zip.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release for a version tag
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release view "$RELEASE_TAG" || gh release create "$RELEASE_TAG" --title "Debate Studio $RELEASE_TAG" --generate-notes

      - name: Attach updater assets to GitHub Release
        if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
        run: gh release upload "$RELEASE_TAG" release/Debate-Studio-*-arm64.dmg release/Debate-Studio-*-arm64.dmg.blockmap release/Debate-Studio-*-arm64.zip release/Debate-Studio-*-arm64.zip.blockmap release/latest-mac.yml --clobber
